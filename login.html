<h2>Área Administrativa</h2>

<!-- LOGIN -->
<div id="loginBox">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>
</div>

<!-- PAINEL -->
<div id="painel" style="display:none;">

  <button onclick="logout()" style="margin-bottom:10px;">
    🔓 Deslogar
  </button>

  <h3>Inscritos</h3>

  <table border="1">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Email</th>
        <th>Gênero</th>
        <th>Raça</th>
        <th>Região</th>
        <th>Bairro</th>
        <th>Atividade</th>
      </tr>
    </thead>

    <tbody id="dados"></tbody>
  </table>

</div>

<script>

const API = "https://brotai-site.onrender.com";

// ================= LOGIN =================
async function login(){

  const res = await fetch(API + '/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ senha: senha.value })
  });

  const data = await res.json();

  if(data.ok){

    // 🔐 salva token
    localStorage.setItem('token', data.token);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";

    carregar();

  } else {
    msg.innerText = "Senha incorreta";
  }

}

// ================= CARREGAR DADOS =================
async function carregar(){

  const token = localStorage.getItem('token');

  const res = await fetch(API + '/dados', {
    headers: {
      'Authorization': token
    }
  });

  if(res.status === 403){
    alert("Sessão expirada ou não logado");
    localStorage.removeItem('token');
    location.reload();
    return;
  }

  const data = await res.json();

  const tabela = document.getElementById("dados");
  tabela.innerHTML = "";

  data.forEach(d => {
    tabela.innerHTML += `
      <tr>
        <td>${d.nome}</td>
        <td>${d.email}</td>
        <td>${d.genero}</td>
        <td>${d.raca}</td>
        <td>${d.regiao}</td>
        <td>${d.bairro}</td>
        <td>${d.atividade}</td>
      </tr>
    `;
  });

}

// ================= LOGOUT =================
function logout(){
  localStorage.removeItem('token');
  alert("Você saiu");
  location.reload();
}

// ================= AUTO LOGIN =================
window.onload = () => {
  const token = localStorage.getItem('token');

  if(token){
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("painel").style.display = "block";
    carregar();
  }
}

</script>
